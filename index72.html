<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Employee Details</title>
    <style>
        * {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}


body {
    margin: 0;
    min-height: 100vh;

    background: linear-gradient(135deg, #1d318b, #0f172a, #030e41);
    /* background: linear-gradient(135deg, #020617, #0f172a, #030e41); */
    background-size: 300% 300%;
    animation: bgMove 14s ease infinite;

    display: flex;
    flex-direction: column;
    align-items: center;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}


.Card {
    margin-top: 45px;


    background: rgba(255, 255, 255, 0.08);
    -webkit-backdrop-filter: blur(22px);
    backdrop-filter: blur(22px);
    

    border-radius: 24px;
    width: 440px;
    padding: 34px 42px;
    text-align: center;

    
    border: 1px solid rgba(255, 255, 255, 0.18);

    /* box-shadow: 0 0 10px rgba(96, 165, 250, 0.6); */
            
     box-shadow: 0 0 10px rgba(83, 153, 238, 0.91),
              inset 0 0 18px rgba(96, 165, 250, 0.6);
        
}

.Card h1 {
    color: white;
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 20px;
}





input {
    width: 100%;
    padding: 13px;
    margin: 11px 0;

    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.196);

   background: rgba(255, 255, 255, 0.08);
   -webkit-backdrop-filter: blur(8px);
   backdrop-filter: blur(8px); 
    color: white;
    font-size: 15px;

    transition: 0.25s;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}


input:focus {
    outline: none;

    background: rgba(255, 255, 255, 0.18);
    border-color: #60a5fa;

    box-shadow: 0 0 10px rgba(96, 165, 250, 0.6);
}




.btn {
    width: 100%;
    padding: 13px;
    margin-top: 13px;

    border: none;
    border-radius: 12px;

    font-size: 15px;
    font-weight: 700;
    color: white;

    cursor: pointer;
    transition: 0.25s;
}



.btn:nth-of-type(1) { background: #3b82f6; }
.btn:nth-of-type(2) { background: #10b981; }
.btn:nth-of-type(3) { background: #06b6d4; }
.btn:nth-of-type(4) { background: #22c55e; }
.btn:nth-of-type(5) { background: #f97316; }
.btn:nth-of-type(6) { background: #6366f1; }

.btn:hover {
    transform: translateY(-3px) scale(1.02);
    filter: brightness(1.1);

    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
}


#output {
    width: 440px;
    margin-top: 22px;
    margin-bottom: 20px;

    padding: 22px;

    background: rgba(255, 255, 255, 0.08);
    -webkit-backdrop-filter: blur(18px);
    backdrop-filter: blur(18px);

    border-radius: 18px;
    color: white;
    font-size: 17px;

    border: 1px solid rgba(255, 255, 255, 0.15);

    /* box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); */
     box-shadow: 0 0 10px rgba(96, 165, 250, 0.6),
              inset 0 0 18px rgba(96, 165, 250, 0.6);

    max-height: 260px;
    overflow-y: auto;
}



.emp-card {
    background: rgba(255, 255, 255, 0.12);
    padding: 14px;
    margin-bottom: 12px;

    border-radius: 12px;
    border-left: 5px solid #60a5fa;

    box-shadow: 0 5px 14px rgba(0, 0, 0, 0.3);
}

.emp-card p {
    margin: 6px 0;
    font-size: 15px;
}


.empty-state {
    text-align: center;
    color: rgba(255, 255, 255, 0.8);
    font-size: 18px;
}

.empty-state span {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
}
    </style>
</head>

<body>
    <div class="main-container">
        <div class="Card">
            <h1>Employee Details</h1>
            <form action="#">
                <input type="text" id="name" placeholder="Employee Name">
                <input type="text" id="id" placeholder="Employee ID">
                <input type="number" id="salary" placeholder="Salary">
                <input type="text" id="dept" placeholder="Department">

                <button type="button" class="btn" onclick="addEmployee()">Add Employee</button>
                <button type="button" class="btn" onclick="displayEmployees()">Display Employees</button>
                <button type="button" class="btn" onclick="averageSalary()">Average Salary</button>
                <button type="button" class="btn" onclick="filterSalary()">Salary > ₹50K</button>
                <button type="button" class="btn" onclick="countByDepartment()">Count Departments</button>
                <button type="button" class="btn" onclick="totalSalary()">Total Salary</button>
            </form>
        </div>
        <div id="output">
            <div class="empty-state">
                No data yet<br>
                <span>Add employees to see results here</span>
            </div>
        </div>
    </div>
    <script>
        let employees = [];

        function addEmployee() {
            let name = document.getElementById("name").value;
            let id = document.getElementById("id").value;
            let salary = parseFloat(document.getElementById("salary").value);
            let department = document.getElementById("dept").value;


            // employees.push({ name, empid, salary, department });

            if (name === "" || id === "" || isNaN(salary) || department === "") {
                alert("Please fill all the fields properly.");
                return;
            }
            // displayEmployees();


            let employee = {
                name: name,
                id: id,
                salary: salary,
                department: department
            };

            employees.push(employee);
            alert("Employee added successfully!");

            document.getElementById("name").value = "";
            document.getElementById("id").value = "";
            document.getElementById("salary").value = "";
            document.getElementById("dept").value = "";
        }



        // function displayEmployees() {
        //    let output = "Employee List:<br><hr>";
        //     employees.forEach((emp) => {
        //         output += `
        //         Name: ${emp.name} <br>
        //         Employee ID: ${emp.id} <br>
        //         Salary: ₹${emp.salary} <br>
        //         Department: ${emp.department} <br><hr>
        //         `;
        //     });
        //     document.getElementById("output").innerHTML = output;
        // }



        function displayEmployees() {
            let output = document.getElementById("output");

            if (employees.length === 0) {
                output.innerHTML = "No employees added yet.";
                return;
            }

            let html = `<h3 style="margin-bottom:15px;">Employee List</h3>`;

            employees.forEach(emp => {
                html += `
        <div class="emp-card">
            <p><b>Name:</b> ${emp.name}</p>
            <p><b>ID:</b> ${emp.id}</p>
            <p><b>Salary:</b> ₹${emp.salary.toLocaleString()}</p>
            <p><b>Department:</b> ${emp.department}</p>
        </div>
        `;
            });

            output.innerHTML = html;
        }








        // function filterSalary(){
        //     let filtered = employees.filter(emp => emp.salary > 50000);
        //     let output = "Employees with Salary greater than ₹50,000:<br><hr>";
        //     filtered.forEach((emp) => {
        //         output += `
        //         Name: ${emp.name} <br>
        //         Employee ID: ${emp.id} <br>
        //         Salary: ₹${emp.salary} <br>
        //         Department: ${emp.department} <br><hr>
        //         `;
        //     });
        //     document.getElementById("output").innerHTML = output;
        // }


        function filterSalary() {
            let output = document.getElementById("output");

            let filtered = employees.filter(emp => emp.salary > 50000);

            if (filtered.length === 0) {
                output.innerHTML = "No employees with salary above ₹50,000.";
                return;
            }

            let html = `<h3 style="margin-bottom:15px;">Employees with Salary > ₹50,000</h3>`;

            filtered.forEach(emp => {
                html += `
        <div class="emp-card">
            <p><b>Name:</b> ${emp.name}</p>
            <p><b>ID:</b> ${emp.id}</p>
            <p><b>Salary:</b> ₹${emp.salary.toLocaleString()}</p>
            <p><b>Department:</b> ${emp.department}</p>
        </div>
        `;
            });

            output.innerHTML = html;
        }


        function totalSalary() {

            let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
            document.getElementById("output").innerHTML = `Total Salary of all Employees: ₹${total}`;
        }

        function averageSalary() {

            if (employees.length === 0) {
                document.getElementById("output").innerHTML = "No employees to calculate average salary.";
                return;
            }
            let average = employees.reduce((sum, emp) => sum + emp.salary, 0) / employees.length;
            document.getElementById("output").innerHTML = `Average Salary of all Employees: ₹${average.toFixed(2)}`;
        }

        function countByDepartment() {

            let deptName = prompt("Enter Department Name:");
            if (!deptName) return;
            let count = employees.filter(emp => emp.department.toLowerCase() === deptName.toLowerCase()).length;
            document.getElementById("output").innerHTML = `Number of Employees in ${deptName} Department: ${count}`;
        }


    </script>
</body>


</body>

</html>
